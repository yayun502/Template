# 原始資料
input_root: input_dataset

# YOLO 輸出資料
output_root: wafer_edge_dataset

# 固定 wafer 幾何資訊
center_x: 2048
center_y: 2048
inner_radius: 1800
outer_radius: 2020

# 若每張 wafer 幾何不同，填入 JSON 路徑；否則設 null
center_json: null

# 拉直後的長條圖尺寸
unwrap_width: 8192
unwrap_height: 256

# Patch 設定
patch_width: 512
stride: 384

# segment 或 detect
task: segment

# Mask value 1 對應 names[0]
names:
  - glue_defect

# 過小區域忽略
min_area: 8

# Polygon 簡化程度
polygon_epsilon_ratio: 0.002

# 訓練集正常 patch 保留比例
negative_keep_ratio: 1.0

seed: 42
